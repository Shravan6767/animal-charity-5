<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .contact-card { border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; border-radius: 5px; }
        #status { font-weight: bold; color: #666; }
    </style>
</head>
<body>
    <h1>Admin Messages</h1>
    <div id="status">Connecting to backend...</div>
    <div id="contact-list"></div>

<script>
    async function loadContacts() {
        // Double check this URL matches your Render Dashboard exactly!
        // Is it "chairty" or "charity"? 
        const renderUrl = "https://animal-chairty-4.onrender.com"; 
        const apiPath = "/api/admin/contacts";

        const statusDiv = document.getElementById('status');
        const listDiv = document.getElementById('contact-list');

        try {
            // Combining the URL - ensure no double slashes
            const response = await fetch(`${renderUrl}${apiPath}`);
            
            if (!response.ok) {
                throw new Error(`Server returned ${response.status}`);
            }

            const data = await response.json();
            
            // Clear the "Loading" status
            statusDiv.style.display = 'none';

            if (data.length === 0) {
                statusDiv.innerText = "No messages found in database.";
                statusDiv.style.display = 'block';
                return;
            }

            // Render the data
            listDiv.innerHTML = ''; // Clear previous content
            data.forEach(contact => {
                const div = document.createElement('div');
                div.className = 'contact-card';
                // matches the fields 'name' and 'message' in your MongoDB
                div.innerHTML = `
                    <strong>Name:</strong> ${contact.name || 'Anonymous'}<br>
                    <strong>Message:</strong> ${contact.message || 'No message'}
                `;
                listDiv.appendChild(div);
            });

        } catch (err) {
            console.error("Fetch Error:", err);
            statusDiv.innerText = "Error: Could not load data. " + err.message;
            statusDiv.style.color = "red";
        }
    }

    // Initialize the load
    loadContacts();
</script>
</body>
</html>
