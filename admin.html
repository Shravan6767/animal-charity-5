<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .message-box { border: 1px solid #ccc; padding: 10px; margin: 10px 0; border-radius: 8px; background: #f9f9f9; }
    </style>
</head>
<body>
    <h1>Admin Messages</h1>
    <div id="status">Connecting...</div>
    <div id="container"></div>

<script>
    async function loadData() {
        // STEP 1: DOUBLE CHECK THIS SPELLING IN RENDER
        // Is it "chairty" or "charity"? If this is wrong, it defaults to the homepage.
        const BASE_URL = "https://animal-chairty-4.onrender.com"; 
        const FULL_URL = BASE_URL + "/api/admin/contacts";

        console.log("Attempting to fetch from:", FULL_URL);

        try {
            const response = await fetch(FULL_URL);
            
            // If it returns "Backend is Running", it's returning text, not JSON.
            // This line will catch if the URL is wrong.
            const contentType = response.headers.get("content-type");
            if (!contentType || !contentType.includes("application/json")) {
                throw new Error("The server sent back a webpage instead of data. Check your API path!");
            }

            const data = await response.json();
            document.getElementById('status').style.display = 'none';
            
            const container = document.getElementById('container');
            if (data.length === 0) {
                container.innerHTML = "<p>No messages found.</p>";
            } else {
                data.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'message-box';
                    div.innerHTML = `<strong>${item.name}:</strong> ${item.message}`;
                    container.appendChild(div);
                });
            }
        } catch (err) {
            console.error("Error details:", err);
            document.getElementById('status').innerText = "Status: " + err.message;
            document.getElementById('status').style.color = "red";
        }
    }

    loadData();
</script>
</body>
</html>
