<!DOCTYPE html>
<html>
<head><title>Admin Dashboard</title></head>
<body>
    <h1>Messages</h1>
    <div id="status">Attempting to connect...</div>
    <div id="container"></div>

<script>
    async function loadData() {
        const url = "https://animal-chairty-4.onrender.com/get-data";
        const status = document.getElementById('status');
        const container = document.getElementById('container');

        try {
            const response = await fetch(url);
            
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}: Failed to reach data.`);
            }

            const data = await response.json();
            status.style.display = 'none';
            
            if (data.length === 0) {
                container.innerHTML = "Database is empty.";
            } else {
                container.innerHTML = data.map(item => 
                    `<div style="border:1px solid #ccc; padding:10px; margin:10px;">
                        <strong>${item.name}:</strong> ${item.message}
                    </div>`
                ).join('');
            }
        } catch (err) {
            // This will tell us if it's a CORS block or a wrong URL
            status.innerHTML = `<span style="color:red">Error: ${err.message}</span><br>
                                <small>Check browser console (F12) for details.</small>`;
        }
    }
    loadData();
</script>
</body>
</html>
